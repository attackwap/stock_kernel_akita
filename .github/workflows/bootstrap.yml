name: Pixel 8a Bootstrap

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install packages
        run: |
          sudo apt update
          sudo apt install -y \
            git curl python3 python3-pip \
            bc bison flex zip unzip \
            rsync wget

      - name: Install repo
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Sync source
        run: |
          chmod +x scripts/sync.sh
          ./scripts/sync.sh

      - name: Upload sync log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-log
          path: |
            sync.log
