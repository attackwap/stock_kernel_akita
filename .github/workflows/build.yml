name: Build Pixel 8a Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show system info
        run: |
          uname -a
          df -h
          free -h
          nproc

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git curl wget unzip zip \
            bc bison flex \
            build-essential \
            clang lld llvm \
            python3 python3-pip \
            libssl-dev libelf-dev \
            cpio rsync \
            repo

      - name: Configure git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Prepare workspace
        run: |
          mkdir -p $GITHUB_WORKSPACE/kernel
          cd $GITHUB_WORKSPACE/kernel
          pwd

      - name: Placeholder
        run: |
          echo "Kernel source belum disinkronkan."
          echo "Workflow berhasil berjalan."
          mkdir -p out
          echo "Waiting for source release..." > out/README.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixel8a-kernel
          path: kernel/out
